<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html,
  body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    position: fixed;
  }

  #c {
    display: block;
    width: 100vw;
    height: 100vh;
    outline: none;
    cursor: none;
    position: fixed;
    top: 0;
    left: 0;
  }
  #ui {
    position: fixed;
    padding: 10px 15px;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 10;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    font-size: 13px;
    color: #ffffff;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(4px);
    border-top: 1px solid rgba(255, 255, 255, 0.1);
  }
  #score-box {
    font-size: 14px;
    font-weight: 500;
    color: #ffffff;
    text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
  }
  #msg {
    font-size: 14px;
    font-weight: 600;
    color: #ffffff;
    min-height: 18px;
    transition: all 0.3s;
    text-shadow:
      0 1px 2px rgba(0, 0, 0, 0.8),
      0 0 8px rgba(0, 0, 0, 0.6);
    padding: 4px 8px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 4px;
  }
  .key {
    display: inline-block;
    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 4px;
    padding: 2px 7px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: #ffffff;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
    font-weight: 500;
  }
</style>

<canvas id="c" tabindex="0"></canvas>
<div id="ui">
  <span id="score-box"
    >Pietre lovite: <span id="score">0</span> /
    <span id="total-stones">15</span></span
  >
  &nbsp;·&nbsp;
  <span class="key">↑↓←→</span> directie &nbsp;
  <span class="key">R</span> reseteaza &nbsp;·&nbsp;
  <span class="key">C</span> camera &nbsp;·&nbsp;
  <span class="key">L</span> faruri &nbsp;·&nbsp;
  <span class="key">N</span> zi/noapte &nbsp;·&nbsp;
  <span id="msg">Click pe scena ca sa incepi</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="index.js" type="module"></script>
